<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payment Confirmation</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container container-large" style="text-align: center;">
        <div style="width: 80px; height: 80px; background-color: #D1FAE5; color: #10B981; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 1.5rem;">
            &#10003;
        </div>
        <h2 style="color: #10B981;">Payment Successful</h2>
        
        <div style="background: #F9FAFB; padding: 2rem; border-radius: var(--radius-lg); text-align: left; margin: 2rem 0; border: 1px solid var(--border-color);">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                <div>
                    <span style="color: var(--text-secondary); font-size: 0.875rem;">Student Name</span>
                    <div style="font-weight: 600;" th:text="${student.name}"></div>
                </div>
                <div>
                    <span style="color: var(--text-secondary); font-size: 0.875rem;">Register Number</span>
                    <div style="font-weight: 600;" th:text="${student.registerNo}"></div>
                </div>
                <div>
                    <span style="color: var(--text-secondary); font-size: 0.875rem;">Semester Applied</span>
                    <div style="font-weight: 600;" th:text="${registration.semester}"></div>
                </div>
                <div>
                    <span style="color: var(--text-secondary); font-size: 0.875rem;">Transaction ID</span>
                    <div style="font-weight: 600;" th:text="${payment.transactionId}"></div>
                </div>
            </div>
            
            <span style="color: var(--text-secondary); font-size: 0.875rem;">Subjects Registered</span>
            <ul style="margin-top: 0.5rem; padding-left: 1.5rem; color: var(--text-primary); font-weight: 500;">
                <li th:each="sub : ${selectedSubjects}" th:text="${sub.subjectCode} + ' - ' + ${sub.subjectName}"></li>
            </ul>
        </div>

        <a th:href="@{/hallticket}" class="btn">Generate Hall Ticket</a>
    </div>
</body>
</html>
