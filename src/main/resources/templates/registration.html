<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Subject Registration</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        function validateSelection() {
            const regularChecked = document.querySelectorAll('input[name="subjects"].regular:checked').length;
            const arrearChecked = document.querySelectorAll('input[name="subjects"].arrear:checked').length;
            
            const totalAllowed = 10;
            const maxRegular = 8;
            const maxArrear = 2; // Derived from Total 10 - 8 regular
            
            const totalSelected = regularChecked + arrearChecked;
            
            if (totalSelected > totalAllowed || arrearChecked > maxArrear) {
                alert(`Maximum exam limit exceeded.\nYou can write only ${totalAllowed} exams per semester.\nRegular subjects: ${maxRegular}\nAllowed arrears: ${maxArrear}`);
                return false;
            }
            return true;
        }

        // Add event listeners to enforce limits defensively on UI click
        document.addEventListener('DOMContentLoaded', () => {
            const allCheckboxes = document.querySelectorAll('input[type="checkbox"]');
            allCheckboxes.forEach(chk => {
                chk.addEventListener('change', () => {
                   const regularChecked = document.querySelectorAll('input[name="subjects"].regular:checked').length;
                   const arrearChecked = document.querySelectorAll('input[name="subjects"].arrear:checked').length;
                   
                   if (regularChecked + arrearChecked > 10 || arrearChecked > 2) {
                       alert("You cannot select more than 10 total subjects, and a maximum of 2 arrears.");
                       chk.checked = false; // revert the click
                   }
                });
            });
        });
    </script>
</head>
<body>
    <div class="container container-large">
        <div class="header">
            <h2>Subject Registration</h2>
            <a th:href="@{/logout}" class="btn danger btn-small">Logout</a>
        </div>
        
        <div th:if="${error}" class="error">
            <p th:text="${error}"></p>
        </div>

        <form th:action="@{/registration}" method="post" onsubmit="return validateSelection()">
            
            <h3>Regular Subjects (Select upto 8)</h3>
            <div class="checkbox-list">
                <div class="checkbox-item" th:each="subject : ${randomSubjects}">
                    <!-- By default, regular subjects are checked -->
                    <input type="checkbox" name="subjects" th:value="${subject.subjectCode}" th:id="${subject.subjectCode}" class="regular" checked>
                    <label th:for="${subject.subjectCode}">
                        <span th:text="${subject.subjectName}"></span>
                        <span class="subject-code" th:text="${subject.subjectCode}"></span>
                    </label>
                </div>
                <div th:if="${#lists.isEmpty(randomSubjects)}" style="grid-column: 1 / -1; text-align: center; color: var(--text-secondary);">
                    No subjects available for this semester.
                </div>
            </div>

            <div th:if="${arrearSubjects != null and !#lists.isEmpty(arrearSubjects)}">
                <h3 style="margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 2rem;">Arrear Subjects (Max 2 Allowed)</h3>
                <div class="checkbox-list">
                    <div class="checkbox-item" th:each="arrear : ${arrearSubjects}">
                        <input type="checkbox" name="subjects" th:value="${arrear.subjectCode}" th:id="${arrear.subjectCode}" class="arrear">
                        <label th:for="${arrear.subjectCode}">
                            <span th:text="${arrear.subjectName}"></span>
                            <span class="subject-code" th:text="${arrear.subjectCode} + ' (Sem ' + ${arrear.semesterFailed} + ')'"></span>
                        </label>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn" style="margin-top: 2rem;">Confirm Selection & Proceed</button>
        </form>
    </div>
</body>
</html>
