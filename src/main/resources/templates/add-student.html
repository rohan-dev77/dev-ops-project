<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Student</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container container-large">
        <div class="header">
            <h2>Add New Student</h2>
            <a th:href="@{/admin/dashboard}" class="btn secondary btn-small">Back to Dashboard</a>
        </div>
        
        <form th:action="@{/admin/add-student}" th:object="${student}" method="post">
            <div class="checkbox-list" style="margin-bottom: 0;">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" th:field="*{username}" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" th:field="*{password}" required>
                </div>
                <div class="form-group">
                    <label for="registerNo">Register Number</label>
                    <input type="text" id="registerNo" th:field="*{registerNo}" required>
                </div>
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" th:field="*{name}" required>
                </div>
                <div class="form-group">
                    <label for="department">Department</label>
                    <select id="department" th:field="*{department}" required>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Information Technology">Information Technology</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Mechanical">Mechanical</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="currentSemester">Current Semester</label>
                    <select id="currentSemester" th:field="*{currentSemester}" required>
                        <!-- For simplicity, assume standard 8 semesters -->
                        <option value="1">Semester 1</option>
                        <option value="2">Semester 2</option>
                        <option value="3">Semester 3</option>
                        <option value="4">Semester 4</option>
                        <option value="5">Semester 5</option>
                        <option value="6">Semester 6</option>
                        <option value="7">Semester 7</option>
                        <option value="8">Semester 8</option>
                    </select>
                </div>
            </div>
            
            <button type="submit" class="btn" style="margin-top: 2rem;">Save Student</button>
        </form>
    </div>
</body>
</html>
