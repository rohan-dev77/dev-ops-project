<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hall Ticket</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        function printHallTicket() {
            window.print();
        }
    </script>
    <style>
        @media print {
            body { background: white; }
            .no-print { display: none; }
            .container-large { box-shadow: none; max-width: 100%; border: none; }
            .ticket-container { border: 2px solid #000; background: #fff; }
        }
    </style>
</head>
<body>
    <div class="container container-large">
        
        <div class="ticket-container">
            <div class="ticket-header">
                <h1 style="margin-bottom: 0.5rem; font-size: 1.8rem;">ANNA UNIVERSITY EXAM HALL TICKET</h1>
                <p style="color: var(--text-secondary);">April / May 2026 Examinations</p>
            </div>
            
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; margin-bottom: 2rem;">
                <div style="display: grid; grid-template-columns: max-content 1fr; gap: 1rem 2rem;">
                    <strong style="color: var(--text-secondary);">Register No:</strong>
                    <div style="font-weight: 700; font-size: 1.1rem;" th:text="${student.registerNo}"></div>
                    
                    <strong style="color: var(--text-secondary);">Name:</strong>
                    <div style="font-weight: 600;" th:text="${student.name}"></div>
                    
                    <strong style="color: var(--text-secondary);">Department:</strong>
                    <div style="font-weight: 600;" th:text="${student.department}"></div>
                    
                    <strong style="color: var(--text-secondary);">Semester:</strong>
                    <div style="font-weight: 600;" th:text="${registration.semester}"></div>
                </div>
                
                <div style="border: 2px solid var(--border-color); display: flex; align-items: center; justify-content: center; color: var(--text-secondary); height: 150px; border-radius: 8px;">
                    Passport Photo Here
                </div>
            </div>

            <h3 style="text-align: left; margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">Registered Subjects</h3>
            <table>
                <thead>
                    <tr>
                        <th>Subject Code</th>
                        <th>Subject Name</th>
                        <th>Exam Date (Tentative)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="sub, iterStat : ${selectedSubjects}">
                        <td th:text="${sub.subjectCode}" style="font-weight: 600; font-family: monospace;"></td>
                        <td th:text="${sub.subjectName}"></td>
                        <td th:text="'1' + ${iterStat.index % 9 + 4} + '-05-2026'"></td> <!-- Dummy dates -->
                    </tr>
                </tbody>
            </table>
            
            <div style="display: flex; justify-content: space-between; margin-top: 4rem;">
                <div style="text-align: center; width: 200px; border-top: 1px dashed var(--text-secondary); padding-top: 0.5rem;">
                    <span style="color: var(--text-secondary); font-size: 0.875rem;">Student Signature</span>
                </div>
                <div style="text-align: center; width: 200px; border-top: 1px dashed var(--text-secondary); padding-top: 0.5rem;">
                    <span style="color: var(--text-secondary); font-size: 0.875rem;">Controller of Examinations</span>
                </div>
            </div>
        </div>

        <div class="actions no-print" style="justify-content: center; margin-top: 2rem;">
            <button class="btn secondary" style="max-width: 250px;" onclick="printHallTicket()">🖨️ Print Hall Ticket</button>
            <a th:href="@{/logout}" class="btn danger" style="max-width: 250px; text-align: center;">Logout</a>
        </div>
    </div>
</body>
</html>
