<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Select Semester</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header" style="justify-content: flex-end;">
            <a th:href="@{/logout}" class="btn danger btn-small">Logout</a>
        </div>
        
        <h2>Select Semester</h2>
        
        <form th:action="@{/semester}" method="post">
            <div class="form-group">
                <label for="semester">Choose Semester for Examination</label>
                <select id="semester" name="semester" required>
                    <option value="" disabled selected>-- Select Semester --</option>
                    <option value="1">Semester 1</option>
                    <option value="2">Semester 2</option>
                    <option value="3">Semester 3</option>
                    <option value="4">Semester 4</option>
                    <option value="5">Semester 5</option>
                    <option value="6">Semester 6</option>
                    <option value="7">Semester 7</option>
                    <option value="8">Semester 8</option>
                </select>
            </div>
            <button type="submit" class="btn">Proceed to Subject Selection</button>
        </form>
    </div>
</body>
</html>
