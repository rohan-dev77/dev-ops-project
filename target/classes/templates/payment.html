<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payment Simulation</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h2>Payment Details</h2>
        
        <div style="background: #F9FAFB; padding: 1.5rem; border-radius: var(--radius-md); border: 1px solid var(--border-color); margin-bottom: 2rem;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                <span>Total Subjects Selected:</span>
                <span style="font-weight: 700;" th:text="${totalSubjects}"></span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                <span>Exam Fee per Subject:</span>
                <span style="font-weight: 700;">&#8377; 150</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 1rem; padding-top: 1rem; border-top: 1px dashed var(--border-color);">
                <span style="font-weight: 700; color: var(--primary-color);">Total Fee:</span>
                <span style="font-weight: 700; font-size: 1.25rem; color: var(--primary-color);" th:text="'&#8377; ' + ${totalFee}"></span>
            </div>
        </div>

        <form th:action="@{/payment}" method="post">
            <button type="submit" class="btn secondary">Proceed to Payment (Simulate)</button>
        </form>
    </div>
</body>
</html>
