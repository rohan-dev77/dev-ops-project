<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container container-large">
        <div class="header">
            <h2>Admin Dashboard</h2>
            <div class="actions" style="margin-top: 0;">
                <a th:href="@{/admin/add-student}" class="btn secondary btn-small">+ Add Student</a>
                <a th:href="@{/admin/logout}" class="btn danger btn-small">Logout</a>
            </div>
        </div>

        <h3>Registered Students</h3>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Register Number</th>
                    <th>Name</th>
                    <th>Username</th>
                    <th>Department</th>
                    <th>Semester</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="student : ${students}">
                    <td th:text="${student.id}"></td>
                    <td th:text="${student.registerNo}"></td>
                    <td th:text="${student.name}"></td>
                    <td th:text="${student.username}"></td>
                    <td th:text="${student.department}"></td>
                    <td th:text="${student.currentSemester}"></td>
                    <td>
                        <a th:href="@{/admin/delete-student/{id}(id=${student.id})}" class="btn danger btn-small" onclick="return confirm('Are you sure you want to remove this student?');">Remove</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(students)}">
                    <td colspan="7" style="text-align: center; padding: 2rem; color: var(--text-secondary);">No students found</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
